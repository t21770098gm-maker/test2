<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photography</title>
    <style>
        /* Base Page Setup */
        body, html {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Ensures footer stays at the bottom */
            background-color: #ffffff;
        }

        /* Top Navigation */
        header {
            padding: 20px 30px;
        }
        nav {
            display: flex;
            gap: 20px;
        }
        nav a {
            text-decoration: none;
            color: #000;
            font-size: 1.2rem;
            text-transform: lowercase;
        }
        nav a:hover {
            text-decoration: underline;
        }

        /* Main Gallery Layout */
        main {
            flex: 1; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px; /* Space between arrows and photo */
            padding: 20px;
        }

        /* Red Navigation Arrows */
        button.nav-arrow {
            background: none;
            border: none;
            font-size: 4rem;
            color: red; /* Styled red to match your sketch */
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        button.nav-arrow:hover {
            transform: scale(1.2);
        }

        /* Big Photo Container */
        .photo-container {
            width: 100%;
            max-width: 900px;
            height: 500px;
            background-color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .photo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Ensures the whole photo fits without cropping */
        }

        /* Centered Footer Navigation */
        footer {
            padding: 30px;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="#">home</a>
            <a href="#">albums</a>
            <a href="#">favorites</a>
            <a href="#">about</a>
        </nav>
    </header>

    <main>
        <button class="nav-arrow" id="prevBtn">&#8592;</button>
        
        <div class="photo-container">
            <img id="mainPhoto" src="" alt="Featured Photography">
        </div>
        
        <button class="nav-arrow" id="nextBtn">&#8594;</button>
    </main>

    <footer>
        <nav>
            <a href="#">home</a>
            <a href="#">albums</a>
            <a href="#">favorites</a>
            <a href="#">about</a>
        </nav>
    </footer>

    <script>
        // 1. Add your photo filenames/paths here
        const photos = [
            "https://picsum.photos/id/1015/900/500", // Example placeholder 1
            "https://picsum.photos/id/1018/900/500", // Example placeholder 2
            "https://picsum.photos/id/1019/900/500", // Example placeholder 3
            "https://picsum.photos/id/1022/900/500"  // Example placeholder 4
        ];

        let currentIndex = 0;
        const imgElement = document.getElementById('mainPhoto');

        // 2. Pick a random photo on initial page load
        function loadRandomPhoto() {
            currentIndex = Math.floor(Math.random() * photos.length);
            updateImageDisplay();
        }

        // 3. Update the image tag to show the correct photo
        function updateImageDisplay() {
            imgElement.src = photos[currentIndex];
        }

        // 4. Make the left arrow go back one picture
        document.getElementById('prevBtn').addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + photos.length) % photos.length;
            updateImageDisplay();
        });

        // 5. Make the right arrow go forward one picture
        document.getElementById('nextBtn').addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % photos.length;
            updateImageDisplay();
        });

        // Start the gallery when the page opens
        loadRandomPhoto();
    </script>
</body>
</html>
